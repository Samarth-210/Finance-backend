spring.application.name=financeApp

# 1. Database Connection URL
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=true

# 2. Database Credentials
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# 3. Driver Class
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 4. Hibernate / JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 5. Security Token Key
jwtKey=${JWT_SECRET}